{% set version = "0.0.4" %}

package:
  name: mt-io
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mt-io/mt_io-{{ version }}.tar.gz
  sha256: 155b923bb68a884badccf3886c22d963c11965f39e899accb6d3461b6db51ab4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - xarray
    - loguru
    - mt-metadata >=1.0.0
    - mt-timeseries >=0.0.2

test:
  imports:
    - mt_io
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/kujaku11/mt-io
  summary: Readers for various magnetotelluric data file types from various data loggers.
  license: CC0-1.0
  license_file: LICENSE
  dev_url: https://github.com/kujaku11/mt-io
  doc_url: https://mth5.readthedocs.io/en/latest/index.html

extra:
  recipe-maintainers:
    - kujaku11
